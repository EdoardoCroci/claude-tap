name: Release

# Fires on every push to main where the VERSION file changed. Tags the new
# version, creates a GitHub Release with auto-generated notes, and bumps
# the formula on the homebrew-tap repo so `brew upgrade claude-tap` picks
# it up automatically — no more manual formula edits, no more forgetting
# to set `git config user.email` in the tap directory.
#
# Setup (one-time, by the repo owner):
#   1. Create a classic Personal Access Token with `repo` scope:
#        https://github.com/settings/tokens/new?scopes=repo&description=claude-tap-release
#   2. Add it as a secret on this repo:
#        gh secret set TAP_TOKEN --body "<token>"
# Without TAP_TOKEN the formula-bump step emits a warning and no-ops;
# tagging and the GitHub Release still happen.

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out claude-tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid VERSION: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"

      - name: Create tag (idempotent)
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists — skipping."
            exit 0
          fi
          git config user.email "edoardocroci@hotmail.com"
          git config user.name  "Edoardo Croci"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
            exit 0
          fi
          gh release create "$TAG" --title "$TAG" --generate-notes

      - name: Compute archive sha256
        id: sha
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # GitHub can take a couple of seconds to expose the archive endpoint
          # for a freshly created tag; retry a few times before giving up.
          for i in 1 2 3 4 5; do
            if curl -sfL -o archive.tar.gz \
              "https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"; then
              break
            fi
            sleep 2
          done
          SHA=$(shasum -a 256 archive.tar.gz | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          rm -f archive.tar.gz

      - name: Bump formula on homebrew-tap
        env:
          TAP_TOKEN:  ${{ secrets.TAP_TOKEN }}
          VERSION:    ${{ steps.ver.outputs.version }}
          TAG:        ${{ steps.ver.outputs.tag }}
          SHA256:     ${{ steps.sha.outputs.sha256 }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::warning::TAP_TOKEN secret not set — skipping homebrew-tap bump. Tag and release were still published."
            exit 0
          fi

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${REPO_OWNER}/homebrew-tap.git" tap
          cd tap
          git config user.email "edoardocroci@hotmail.com"
          git config user.name  "Edoardo Croci"

          python3 - <<'PY'
          import pathlib, re, os
          path = pathlib.Path("Formula/claude-tap.rb")
          src = path.read_text()
          new_url = f'  url "https://github.com/{os.environ["REPO_OWNER"]}/claude-tap/archive/refs/tags/{os.environ["TAG"]}.tar.gz"'
          new_sha = f'  sha256 "{os.environ["SHA256"]}"'
          new_ver = f'  version "{os.environ["VERSION"]}"'
          src = re.sub(r'^\s*url\s+"[^"]+".*$',     new_url, src, count=1, flags=re.M)
          src = re.sub(r'^\s*sha256\s+"[^"]+".*$',  new_sha, src, count=1, flags=re.M)
          src = re.sub(r'^\s*version\s+"[^"]+".*$', new_ver, src, count=1, flags=re.M)
          path.write_text(src)
          PY

          if git diff --quiet Formula/claude-tap.rb; then
            echo "Formula already at ${VERSION} — nothing to commit."
            exit 0
          fi

          git add Formula/claude-tap.rb
          git commit -m "chore: bump claude-tap to ${VERSION}"
          git push origin HEAD
